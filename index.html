    <meta property="og:title" content="כמה אתה מזהה צמחי בר? 🔍">

<body>
    <div id="app">
        <!-- Welcome Screen -->
        <div id="welcome-screen" class="screen active">
            <div class="welcome-content">
                <div class="welcome-decoration">
                    <span>🌱</span>
                    <span>🔍</span>
                    <span>🌿</span>
                </div>
                <h1>חידון זיהוי<br><span class="highlight">צמחי בר</span> למאכל</h1>
                <p class="subtitle">בינתיים, בין אזעקה לאזעקה 🚨<br>בוא/י נבדוק כמה צמחי בר של ארץ ישראל את/ה מזהה</p>
                <div class="welcome-decoration">
                    <span>🍃</span>
                    <span>🌾</span>
                    <span>🌸</span>
                </div>
                <button id="start-btn" class="btn btn-primary" onclick="startQuiz()">🔍 בוא נזהה צמחים</button>
            </div>
        </div>

        <!-- Question Screen -->
        <div id="question-screen" class="screen">
            <div class="question-header">
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div class="question-counter">
                        🔍 שאלה <span id="current-q">1</span> מתוך <span id="total-q">8</span>
                    </div>
                    <div id="live-timer" class="live-timer" style="display:none;">0:00</div>
                    <div class="score-display">
                        ניקוד: <span id="live-score">0</span>
                    </div>
                </div>
            </div>
            <div class="question-body">
                <p id="question-text" class="question-text">איזה צמח בתמונה?</p>
                <div id="plant-image-container" class="plant-image-container">
                    <img id="plant-image" class="plant-image" src="" alt="צמח לזיהוי">
                </div>
                <div id="options-container" class="options-container"></div>
                <!-- Feedback -->
                <div id="feedback-container" class="feedback-container" style="display:none;">
                    <div class="feedback-row">
                        <span id="feedback-icon" class="feedback-icon"></span>
                        <p id="feedback-text" class="feedback-text"></p>
                    </div>
                    <div class="feedback-actions">
                        <a id="feedback-link" class="feedback-link" href="#" target="_blank" rel="noopener">ויקיפדיה</a>
                        <button id="next-btn" class="btn btn-primary btn-next" onclick="nextQuestion()">הבא</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="screen">
            <div class="results-content">
                <div class="score-circle">
                    <svg viewBox="0 0 120 120">
                        <circle class="score-bg" cx="60" cy="60" r="54"/>
                        <circle id="score-ring" class="score-ring" cx="60" cy="60" r="54"/>
                    </svg>
                    <div class="score-number">
                        <span id="final-score">0</span>
                    </div>
                </div>
                <h2 id="result-title" class="result-title"></h2>
                <p class="time-result">&#8986; <span id="time-result"></span></p>
                <p id="result-message" class="result-message"></p>
                <p class="challenge-text" id="challenge-text"></p>

                    <button class="btn btn-secondary" onclick="startQuiz()">שחק שוב</button>
